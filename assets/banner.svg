<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 240" role="img" aria-label="Rubicon Marketing Board">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0f18"/>
      <stop offset="1" stop-color="#1b2436"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="28%" r="65%">
      <stop offset="0" stop-color="#c9a227" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#c9a227" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="table" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#212e4a"/>
      <stop offset="1" stop-color="#0e1524"/>
    </linearGradient>
    <radialGradient id="dissenterGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#e3c169" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#e3c169" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="960" height="240" rx="14" fill="url(#bg)"/>
  <rect width="960" height="240" rx="14" fill="url(#glow)"/>

  <text x="480" y="46" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="31" fill="#eef1ef" letter-spacing="0.5">Rubicon Marketing Board</text>
  <rect x="430" y="56" width="100" height="1.5" fill="#c9a227" opacity="0.75"/>

  <!-- the table: nine seats, eight aligned, one who isn't -->
  <ellipse cx="480" cy="146" rx="216" ry="50" fill="url(#table)" stroke="#3d4c66" stroke-width="1.25"/>

  <g fill="#3d4c66" stroke="#5a6c92" stroke-width="0.75">
    <rect x="343" y="87" width="15" height="8" rx="2"/>
    <rect x="602" y="87" width="15" height="8" rx="2"/>
    <rect x="270" y="120" width="15" height="8" rx="2"/>
    <rect x="675" y="120" width="15" height="8" rx="2"/>
    <rect x="288" y="176" width="15" height="8" rx="2"/>
    <rect x="657" y="176" width="15" height="8" rx="2"/>
    <rect x="401" y="199" width="15" height="8" rx="2"/>
    <rect x="544" y="199" width="15" height="8" rx="2"/>
  </g>

  <!-- the designated dissenter: head of the table, facing the room -->
  <circle cx="480" cy="76" r="16" fill="url(#dissenterGlow)"/>
  <rect x="470" y="71" width="20" height="10" rx="2.5" fill="#c9a227"/>

  <text x="480" y="222" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#8fa1bd" letter-spacing="2.5">NINE ADVISORS · ZERO CHEERLEADERS</text>
</svg>
